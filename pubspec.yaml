name: social_media_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  go_router: ^17.2.1
  google_fonts: ^8.0.2
  image_picker: ^1.2.1
  shared_preferences: ^2.5.5
  iconsax: ^0.0.8
  http: ^1.2.1
  flutter_animate: ^4.5.2
  supabase_flutter: ^2.12.2
  flutter_staggered_grid_view: ^0.7.0
  audioplayers: ^6.6.0
  # Profile picture cropping
  image_cropper: ^8.0.2
  # Video & Audio calls
  flutter_webrtc: ^1.4.1
  # Permissions (camera, microphone)
  permission_handler: ^11.3.1
  # UUID generation for call rooms
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
